---
# =============================================================================
# Apache Airflow 3.x -- Development Docker Compose
# Executor : LocalExecutor
# Database : PostgreSQL (latest)
#
# Auth: SimpleAuthManager (Airflow 3.x default)
#   - Users are defined via AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS env var
#   - Passwords are stored in a mounted JSON file (config/passwords.json)
#   - 'airflow users create' CLI command no longer works in Airflow 3.x
# =============================================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment: &airflow-common-env
    # -- Core ------------------------------------------------------------------
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags

    # -- Auth (SimpleAuthManager) ----------------------------------------------
    # Format: "username:role" pairs separated by commas
    # Roles: Admin, Op, User, Viewer
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "${AIRFLOW_ADMIN_USERNAME}:Admin"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/config/passwords.json

    # -- Database --------------------------------------------------------------
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

    # -- API -------------------------------------------------------------------
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW__API__SECRET_KEY}

    # -- Logging ---------------------------------------------------------------
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./config/passwords.json:/opt/airflow/config/passwords.json:ro
    # -- Domain data directories -----------------------------------------------
    - ./data/raw:/opt/airflow/data/raw
    - ./data/processed:/opt/airflow/data/processed
    - ./data/exception:/opt/airflow/data/exception

  networks:
    - airflow-network

  depends_on:
    postgres:
      condition: service_healthy


# =============================================================================
# Services
# =============================================================================
services:

  # -- PostgreSQL --------------------------------------------------------------
  postgres:
    image: postgres:latest
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - airflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s
    restart: unless-stopped

  # -- Airflow Init ------------------------------------------------------------
  # Runs DB migration only. User creation is handled by SimpleAuthManager
  # via the passwords.json file and SIMPLE_AUTH_MANAGER_USERS env var.
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Running DB migration..."
        airflow db migrate
        echo "Airflow initialisation complete."
    environment:
      <<: *airflow-common-env
    restart: "no"

  # -- Scheduler ---------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    environment:
      <<: *airflow-common-env
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # -- API Server (serves both REST API and Web UI) ----------------------------
  # Web UI  : http://localhost:8080
  # REST API: http://localhost:8080/api/v2
  airflow-apiserver:
    <<: *airflow-common
    container_name: airflow-apiserver
    command: api-server
    environment:
      <<: *airflow-common-env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5
      start_period: 30s
      timeout: 10s
    restart: unless-stopped


# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
    name: airflow-postgres-data


# =============================================================================
# Networks
# =============================================================================
networks:
  airflow-network:
    name: airflow-network
    driver: bridge