---
# =============================================================================
# Apache Airflow 3.x -- Development Docker Compose
# Executor : LocalExecutor
# Database : PostgreSQL 18
#
# Auth: SimpleAuthManager (Airflow 3.x default)
#   - Users are defined via AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS env var
#   - Passwords are read from a pre-seeded JSON file (config/passwords.json),
#     mounted read-only. See README for how to create it.
#   - 'airflow users create' CLI command no longer works in Airflow 3.x
# =============================================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  # Run containers as the host user (group 0) so files written to bind-mounted
  # dags/, logs/, plugins/ and data/ are owned by you, not root. Defaults to the
  # image's airflow user (50000) if AIRFLOW_UID is unset.
  user: "${AIRFLOW_UID:-50000}:0"
  environment: &airflow-common-env
    # -- Core ------------------------------------------------------------------
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    # Fail fast if the key is missing rather than booting with a broken config.
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:?FERNET_KEY is not set - generate one and add it to .env}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags

    # -- Auth (SimpleAuthManager) ----------------------------------------------
    # Format: "username:role" pairs separated by commas
    # Roles: Admin, Op, User, Viewer
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "${AIRFLOW_ADMIN_USERNAME}:Admin"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/config/passwords.json

    # -- Database --------------------------------------------------------------
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

    # -- API -------------------------------------------------------------------
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW__API__SECRET_KEY:?API SECRET_KEY is not set - generate one and add it to .env}

    # -- Logging ---------------------------------------------------------------
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./config/passwords.json:/opt/airflow/config/passwords.json:ro
    # -- Domain data directories -----------------------------------------------
    - ./data/raw:/opt/airflow/data/raw
    - ./data/processed:/opt/airflow/data/processed
    - ./data/exception:/opt/airflow/data/exception

  networks:
    - airflow-network

  depends_on:
    postgres:
      condition: service_healthy


# =============================================================================
# Services
# =============================================================================
services:

  # -- PostgreSQL --------------------------------------------------------------
  postgres:
    # Pinned to a major version. 'latest' can silently jump major versions on a
    # future pull and refuse to start on an existing data directory.
    #
    # PGDATA is intentionally NOT set: postgres:18 uses a version-specific data
    # dir (/var/lib/postgresql/18/docker) under the volume mounted below, which
    # enables fast pg_upgrade --link across future major versions. The volume is
    # mounted at /var/lib/postgresql (the VOLUME declared by the 18+ image).
    image: postgres:18
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - airflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s
    restart: unless-stopped

  # -- Airflow Init ------------------------------------------------------------
  # Runs the DB migration only (idempotent). User creation is handled by
  # SimpleAuthManager via passwords.json and SIMPLE_AUTH_MANAGER_USERS.
  #
  # Uses the image's default entrypoint (same as the other services) so that
  # `airflow db migrate` runs with the built-in DB-connection wait, and a
  # migration failure exits non-zero. That makes service_completed_successfully
  # actually mean "migration succeeded", so the scheduler/apiserver never start
  # against a half-migrated database.
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: db migrate
    environment:
      <<: *airflow-common-env
    restart: "no"

  # -- DAG Processor -----------------------------------------------------------
  # Airflow 3.x parses DAG files in a separate process, isolated from the
  # scheduler (which no longer has access to DAG files). Required for DAGs
  # dropped into ./dags to be detected and scheduled.
  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow-dag-processor
    command: dag-processor
    environment:
      <<: *airflow-common-env
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # -- Scheduler ---------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    environment:
      <<: *airflow-common-env
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # -- API Server (serves both REST API and Web UI) ----------------------------
  # Web UI  : http://localhost:8080
  # REST API: http://localhost:8080/api/v2
  airflow-apiserver:
    <<: *airflow-common
    container_name: airflow-apiserver
    command: api-server
    environment:
      <<: *airflow-common-env
    ports:
      # Bind to loopback only so the UI/API is not exposed to the LAN.
      # Still reachable from Windows as http://localhost:8080 via WSL2's
      # localhost forwarding. Use "0.0.0.0:8080:8080" to expose it on the LAN.
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5
      start_period: 30s
      timeout: 10s
    restart: unless-stopped


# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
    name: airflow-postgres-data


# =============================================================================
# Networks
# =============================================================================
networks:
  airflow-network:
    name: airflow-network
    driver: bridge